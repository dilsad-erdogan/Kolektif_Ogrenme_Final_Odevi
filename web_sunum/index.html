<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritma Rota Kıyaslaması</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Map Overlay & Controls -->
        <div id="sidebar">
            <h1 class="title">IETT Akıllı Rotalama</h1>
            <p class="subtitle">Kolektif Makine Öğrenmesi Rota Optimizasyonu</p>

            <div class="models-container">
                <button class="model-btn active" data-model="1">Random Forest</button>
                <button class="model-btn" data-model="2">XGBoost</button>
                <button class="model-btn" data-model="3">Stacking Meta-Model</button>
            </div>

            <div class="metrics-panel">
                <h3>Performans Metrikleri</h3>
                <div class="metric"><span class="label">Güven (Confidence)</span> <span class="value" id="val-conf">-</span></div>
                <div class="metric"><span class="label">Toplam Rota</span> <span class="value" id="val-dist">-</span></div>
                <div class="metric"><span class="label">Genel Başarı (Acc)</span> <span class="value" id="val-acc">-</span></div>
                <div class="metric"><span class="label">F1-Skoru</span> <span class="value" id="val-f1">-</span></div>
                <div class="metric"><span class="label">ROC-AUC</span> <span class="value" id="val-auc">-</span></div>
            </div>
            
            <div class="routes-panel">
                <h3>Rota Sıralaması</h3>
                <ul id="route-list">
                    <!-- Dinamik eklenecek -->
                </ul>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Mükemmel Rota Animasyonu için AntPath Eklentisi -->
    <script src="https://unpkg.com/leaflet-ant-path"></script>
    <!-- Data Source (Generated by python) -->
    <script src="data.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
